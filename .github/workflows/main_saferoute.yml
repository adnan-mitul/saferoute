name: Build and deploy ASP.Net Core app to Azure Web App - SafeRoute

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
                  dotnet-version: '10.0.x'

      - name: dotnet publish
        run: dotnet publish -c Release -o ./output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saferoute-app
          path: ./output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: saferoute-app
          path: ./publish-files

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D5A5E10ADFAA4B5888E3F8C9F46FF7A7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_133B0E23DDE94A66A0982EF7703B91EA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_797E1E9E88E9471887662710D7E9EA4D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SafeRoute'
          slot-name: 'Production'
          package: ./publish-files
